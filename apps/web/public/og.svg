<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Networked Players — an evidence-first music-credit graph">
  <rect width="1200" height="630" fill="#10100e"/>
  <g transform="translate(880 315)">
    <circle r="230" fill="#1a1a18" stroke="rgba(238,229,210,0.18)"/>
    <circle r="190" fill="none" stroke="rgba(238,229,210,0.10)"/>
    <circle r="150" fill="none" stroke="rgba(238,229,210,0.10)"/>
    <circle r="110" fill="none" stroke="rgba(238,229,210,0.10)"/>
    <circle r="74" fill="#78aaa0"/>
    <circle r="10" fill="#10100e"/>
  </g>
  <text x="90" y="250" font-family="Georgia, 'Times New Roman', serif" font-size="84" fill="#fff8e8">Networked Players</text>
  <text x="92" y="320" font-family="'IBM Plex Mono', monospace" font-size="30" letter-spacing="3" fill="#c9553f">EVIDENCE-FIRST MUSIC-CREDIT GRAPH</text>
  <text x="92" y="400" font-family="Inter, sans-serif" font-size="34" fill="#b8ae9e">A documented path between two artists —</text>
  <text x="92" y="446" font-family="Inter, sans-serif" font-size="34" fill="#b8ae9e">and the credits that prove every step.</text>
</svg>
