name: Validate catalog tooling

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv
      - name: Install project
        # --extra jobs: redis/rq, needed to import scripts/_fleet_check.py
        # (scripts/tests/test_fleet_check.py) even though the tests never
        # touch a real broker.
        run: uv sync --extra dev --extra jobs --locked
      - name: Lint
        run: uv run ruff check .
      - name: Format
        run: uv run ruff format --check .
      - name: Type check
        run: uv run mypy
      - name: Test
        run: uv run pytest
