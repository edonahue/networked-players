name: Research Discogs dump sizing

on:
  pull_request:
  push:
    branches:
      - codex/discogs-ingestion-foundation

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Probe monthly objects and estimate gzip expansion
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          import re
          import traceback
          import urllib.error
          import urllib.request
          import zlib
          from datetime import date, datetime, timezone
          from pathlib import Path

          bucket = "https://discogs-data-dumps.s3.us-west-2.amazonaws.com"
          kinds = ("artists", "labels", "masters", "releases")
          user_agent = "networked-players-research/0.1 (+https://github.com/edonahue/networked-players)"

          def object_url(snapshot: str, kind: str) -> str:
              return f"{bucket}/data/{snapshot[:4]}/discogs_{snapshot}_{kind}.xml.gz"

          def probe(snapshot: str, kind: str) -> dict[str, object]:
              url = object_url(snapshot, kind)
              request = urllib.request.Request(
                  url,
                  headers={"Range": "bytes=0-0", "User-Agent": user_agent},
              )
              try:
                  with urllib.request.urlopen(request, timeout=60) as response:
                      content_range = response.headers.get("Content-Range", "")
                      match = re.search(r"/(\d+)$", content_range)
                      size = int(match.group(1)) if match else int(response.headers.get("Content-Length", "0"))
                      return {
                          "kind": kind,
                          "url": url,
                          "status": response.status,
                          "size_bytes": size,
                          "etag": response.headers.get("ETag", "").strip('"'),
                          "last_modified": response.headers.get("Last-Modified", ""),
                      }
              except urllib.error.HTTPError as error:
                  return {"kind": kind, "url": url, "status": error.code, "size_bytes": None}

          today = date.today()
          candidates = []
          for month in range(1, today.month + 1):
              snapshot = f"{today.year}{month:02d}01"
              objects = [probe(snapshot, kind) for kind in kinds]
              candidates.append({"snapshot": snapshot, "objects": objects})

          complete = [
              candidate
              for candidate in candidates
              if all(obj["status"] in (200, 206) and obj["size_bytes"] for obj in candidate["objects"])
          ]
          if not complete:
              raise RuntimeError(f"No complete {today.year} snapshot found: {json.dumps(candidates, indent=2)}")

          latest = complete[-1]
          sample_bytes = 32 * 1024 * 1024
          for obj in latest["objects"]:
              request = urllib.request.Request(
                  str(obj["url"]),
                  headers={
                      "Range": f"bytes=0-{sample_bytes - 1}",
                      "User-Agent": user_agent,
                  },
              )
              decompressor = zlib.decompressobj(16 + zlib.MAX_WBITS)
              compressed_read = 0
              uncompressed_read = 0
              with urllib.request.urlopen(request, timeout=180) as response:
                  while compressed_read < sample_bytes:
                      chunk = response.read(min(1024 * 1024, sample_bytes - compressed_read))
                      if not chunk:
                          break
                      compressed_read += len(chunk)
                      uncompressed_read += len(decompressor.decompress(chunk))
              ratio = uncompressed_read / compressed_read if compressed_read else None
              obj["sample_compressed_bytes"] = compressed_read
              obj["sample_uncompressed_bytes"] = uncompressed_read
              obj["sample_expansion_ratio"] = ratio
              obj["estimated_uncompressed_bytes"] = round(int(obj["size_bytes"]) * ratio) if ratio else None

          payload = {
              "observed_at": datetime.now(timezone.utc).isoformat(),
              "discovery_method": "Probe the documented monthly object naming convention and accept only snapshots with all four XML gzip objects.",
              "latest_complete_snapshot": latest,
              "all_candidates": candidates,
              "sample_method": "Sequentially decompress the first 32 MiB of each gzip object; extrapolate only as a planning estimate.",
          }
          Path("discogs-dump-research.json").write_text(json.dumps(payload, indent=2) + "\n")

          def gib(value: int | None) -> str:
              return "—" if value is None else f"{value / (1024 ** 3):.2f} GiB"

          lines = [
              "# Discogs dump sizing research",
              "",
              f"Observed: {payload['observed_at']}",
              f"Latest complete snapshot discovered: `{latest['snapshot']}`",
              "",
              "| Object | Compressed | Prefix expansion | Estimated XML | ETag |",
              "| --- | ---: | ---: | ---: | --- |",
          ]
          for obj in latest["objects"]:
              lines.append(
                  f"| `{obj['kind']}` | {gib(obj['size_bytes'])} | {obj['sample_expansion_ratio']:.2f}× | {gib(obj['estimated_uncompressed_bytes'])} | `{obj['etag']}` |"
              )
          compressed_total = sum(int(obj["size_bytes"]) for obj in latest["objects"])
          estimated_total = sum(int(obj["estimated_uncompressed_bytes"]) for obj in latest["objects"])
          lines.extend([
              f"| **Total** | **{gib(compressed_total)}** | — | **{gib(estimated_total)}** | — |",
              "",
              "> Compressed sizes are observed object metadata. Estimated XML sizes are extrapolated from a 32 MiB prefix sample and are planning estimates, not authoritative object metadata.",
          ])
          Path("discogs-dump-research.md").write_text("\n".join(lines) + "\n")
          print(Path("discogs-dump-research.md").read_text())
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: discogs-dump-research
          path: |
            discogs-dump-research.json
            discogs-dump-research.md
