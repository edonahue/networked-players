name: Research Discogs dump sizing

on:
  pull_request:
  push:
    branches:
      - codex/discogs-ingestion-foundation

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Probe the public Discogs dump endpoints
        run: |
          set +e
          curl --location --silent --show-error --dump-header index.headers \
            'https://discogs-data-dumps.s3.us-west-2.amazonaws.com/index.html' \
            --output index.html 2>index.error
          echo $? > index.status

          curl --location --silent --show-error --dump-header old-listing.headers \
            'https://discogs-data-dumps.s3.us-west-2.amazonaws.com/?prefix=data%2F2026%2F' \
            --output old-listing.xml 2>old-listing.error
          echo $? > old-listing.status

          curl --location --silent --show-error --dump-header v2-listing.headers \
            'https://discogs-data-dumps.s3.us-west-2.amazonaws.com/?list-type=2&prefix=data%2F2026%2F' \
            --output v2-listing.xml 2>v2-listing.error
          echo $? > v2-listing.status

          for file in index.status index.headers index.error old-listing.status old-listing.headers old-listing.error v2-listing.status v2-listing.headers v2-listing.error; do
            echo "===== $file ====="
            cat "$file"
          done
          for file in index.html old-listing.xml v2-listing.xml; do
            echo "===== $file ($(wc -c < "$file") bytes) ====="
            head -c 500 "$file"
            echo
          done
      - uses: actions/upload-artifact@v4
        with:
          name: discogs-dump-probe
          path: |
            index.html
            index.headers
            index.error
            index.status
            old-listing.xml
            old-listing.headers
            old-listing.error
            old-listing.status
            v2-listing.xml
            v2-listing.headers
            v2-listing.error
            v2-listing.status
