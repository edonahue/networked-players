---
# Pi 3B worker hardening -- ADR 0014's own Revisit trigger named this
# moment: "Revisit once the Raspberry Pi workers are provisioned -- they'll
# need their own hardening pass... a different harden.yml task set... than
# this one's coordinators-only scope." This is that pass.
#
# Narrower than harden.yml on purpose -- confirmed live before writing this
# that journald is already persistent on these Pis (unlike the coordinator)
# and no swap exists (so vm.swappiness tuning would be a no-op). Only the
# real, confirmed gaps are addressed: an unarmed hardware watchdog and
# missing Docker log rotation.
#
# become is set per-task, NOT at the play level -- same reason harden.yml
# documents: a blanket play-level become hung on the implicit
# facts-gathering task on this project before, even with --ask-become-pass
# already supplied.
#
# Scoped to `pi_workers`, NOT the broader `workers` group (ADR 0022) --
# the watchdog-device and SD-card log-rotation reasoning below are real Pi
# facts that don't hold for a ZimaBoard worker.
#
# Usage (from infra/ansible/, with a real local inventory):
#   ansible-playbook -i inventories/local/hosts.yml playbooks/harden-workers.yml --ask-become-pass
- name: Pi 3B worker hardening
  hosts: pi_workers
  gather_facts: true
  tasks:
    - name: Arm the hardware watchdog (RuntimeWatchdogSec)
      # /dev/watchdog + /dev/watchdog0 are present (Broadcom SoC watchdog,
      # built into the kernel on this Pi OS -- confirmed live no loadable
      # module shows in lsmod, unlike the coordinator's wdat_wdt). Unarmed
      # by default; same mechanism and values as the coordinator (ADR 0014).
      ansible.builtin.lineinfile:
        path: /etc/systemd/system.conf
        regexp: "^#?RuntimeWatchdogSec="
        line: "RuntimeWatchdogSec=30"
        insertafter: "^\\[Manager\\]"
      become: true
      notify: Reexec systemd manager

    - name: Arm the reboot-time watchdog (RebootWatchdogSec)
      ansible.builtin.lineinfile:
        path: /etc/systemd/system.conf
        regexp: "^#?RebootWatchdogSec="
        line: "RebootWatchdogSec=10min"
        insertafter: "^\\[Manager\\]"
      become: true
      notify: Reexec systemd manager

    - name: Configure Docker log rotation
      # No daemon.json existed before this on any worker -- confirmed live.
      # Real risk on SD-card-backed storage with finite write endurance and
      # modest free space, not just tidiness. No live-restore key: ADR 0014
      # found it flatly incompatible with Swarm mode; that's a dockerd-level
      # constraint, not coordinator-specific, so it stays unset here too.
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        mode: "0644"
        content: |
          {
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            }
          }
      become: true
      notify: Restart docker

    - name: Ensure the docker.service drop-in directory exists
      ansible.builtin.file:
        path: /etc/systemd/system/docker.service.d
        state: directory
        mode: "0755"
      become: true

    - name: Install docker.service restart-limit drop-in (survive power-outage boot races)
      # After the 2026-07-08 site power outage, dockerd on all three Pi workers
      # started before the LAN route to the Swarm manager (:2377) was up, its
      # cluster component failed with "network is unreachable", and systemd
      # gave up after the default start-limit (3 quick retries) -- leaving
      # Docker `failed` for ~27h even though the network recovered seconds
      # later. A Pi worker cannot guarantee the manager/switch is up before it
      # boots, so the robust fix is retry-until-reachable, not just boot
      # ordering: disable the start-rate limit and retry every 10s. Default
      # RestartSec (~2s) is what burned through the 3-retry burst in seconds.
      ansible.builtin.copy:
        dest: /etc/systemd/system/docker.service.d/restart-limit.conf
        mode: "0644"
        content: |
          [Unit]
          StartLimitIntervalSec=0
          Wants=network-online.target
          After=network-online.target

          [Service]
          Restart=always
          RestartSec=10s
      become: true
      notify: Reload and recover docker

    - name: Enable linger for the ansible_user
      # Required for `systemd-run --user`, invoked non-interactively by
      # run-rq-burst-worker.yml and run-dask-worker-burst.yml -- without
      # linger, a --user systemd instance only exists while a real login
      # session is active, and a bare SSH/Ansible exec has no such session
      # to keep it alive. This is a one-time, root-required setup step
      # (paid here, in the already-become:true hardening pass), so those
      # two per-run playbooks can stay permanently become-free -- one of
      # them (run-rq-burst-worker.yml) is invoked non-interactively by
      # scripts/cluster_benchmark_distributed.py, which has no path to
      # supply a sudo password at all.
      ansible.builtin.command: "loginctl enable-linger {{ ansible_user }}"
      become: true
      changed_when: true

    - name: Report hardening status
      ansible.builtin.debug:
        msg:
          - "host: {{ inventory_hostname }}"
          - "hardware watchdog: RuntimeWatchdogSec=30 configured (reliable confirmation needs a real reboot)"
          - "docker: log-opts configured (does NOT retroactively apply to already-running containers)"
          - "docker restart-limit drop-in installed (retries until the Swarm manager is reachable after a boot race)"
          - "journald persistence: already correct on this host, not touched"
          - "vm.swappiness: no swap configured on this host, not touched"
          - "linger enabled for {{ ansible_user }} (required for systemd-run --user)"

  handlers:
    - name: Reexec systemd manager
      ansible.builtin.command: systemctl daemon-reexec
      become: true
      changed_when: true

    - name: Restart docker
      ansible.builtin.systemd:
        name: docker
        state: restarted
      become: true

    - name: Reload and recover docker
      # daemon-reload picks up the new drop-in; reset-failed clears any
      # start-limit failure counter left from a boot race; start brings a
      # currently-failed daemon back (no-op if already running).
      ansible.builtin.shell: >-
        systemctl daemon-reload
        && systemctl reset-failed docker
        && systemctl start docker
      become: true
      changed_when: true
