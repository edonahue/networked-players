---
# Deploys the CONNECTION-DAILY-MANIFEST artifact-check job body
# (files/daily_manifest_check_job.py) AND the real daily-manifest.v1/
# rounds.v1 artifacts to Pi workers' persistent RQ jobs directory. Same
# job-body-plus-artifact pattern as deploy-connection-rounds-check-job.yml/
# deploy-verify-job.yml.
#
# Copies the rounds artifact as connection-rounds.v1.json -- the same
# filename deploy-connection-rounds-check-job.yml uses for the identical
# real file. Deliberately a redundant copy rather than a shared reference:
# each deploy playbook stays independently runnable (no inter-playbook
# ordering dependency), and a harmless duplicate copy is the right trade-off
# over inventing a third name for the same content (see ADR 0043's slice-8
# addendum).
#
# hosts: pi_workers, not the flat `workers` group -- this is Pi-ambient
# validation work, not x86-worker traversal/scoring work.
#
# Usage (from infra/ansible/, with a real local inventory):
#   ansible-playbook -i inventories/local/hosts.yml playbooks/deploy-daily-manifest-check-job.yml \
#     --limit worker-01.example.internal
#   # override the artifact sources:
#   ansible-playbook -i inventories/local/hosts.yml playbooks/deploy-daily-manifest-check-job.yml \
#     -e manifest_artifact_path=apps/web/public/data/game/daily-manifest.v1.json \
#     -e rounds_artifact_path=apps/web/public/data/game/rounds.v1.json
- name: Deploy the Connection-daily-manifest artifact-check job to Pi workers
  hosts: pi_workers
  gather_facts: true
  vars:
    rq_jobs_dir: "{{ ansible_env.HOME }}/.local/share/networked-players/rq-jobs"
    manifest_artifact_path: apps/web/public/data/game/daily-manifest.v1.json
    rounds_artifact_path: apps/web/public/data/game/rounds.v1.json
  tasks:
    - name: Require the artifacts to exist on the control node
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../../../{{ item }}"
      register: artifact_stat
      delegate_to: localhost
      become: false
      loop:
        - "{{ manifest_artifact_path }}"
        - "{{ rounds_artifact_path }}"

    - name: Fail loudly if an artifact is missing
      ansible.builtin.assert:
        that:
          - item.stat.exists
        fail_msg: >-
          No artifact at {{ item.item }}. Build one first
          (uv run networked-players-catalog build-connection-daily-manifest ...)
          or pass -e manifest_artifact_path=<path> -e rounds_artifact_path=<path>.
      loop: "{{ artifact_stat.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Create the RQ jobs directory
      ansible.builtin.file:
        path: "{{ rq_jobs_dir }}"
        state: directory
        mode: "0755"

    - name: Copy the daily-manifest artifact-check job body (same file every worker gets, unmodified)
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/daily_manifest_check_job.py"
        dest: "{{ rq_jobs_dir }}/daily_manifest_check_job.py"
        mode: "0644"

    - name: Copy the daily-manifest artifact
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../../{{ manifest_artifact_path }}"
        dest: "{{ rq_jobs_dir }}/daily-manifest.v1.json"
        mode: "0644"

    - name: Copy the rounds artifact
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../../{{ rounds_artifact_path }}"
        dest: "{{ rq_jobs_dir }}/connection-rounds.v1.json"
        mode: "0644"
      register: artifact_copy

    - name: Report deployment
      ansible.builtin.debug:
        msg:
          - "host: {{ inventory_hostname }}"
          - "job body + artifacts deployed to {{ rq_jobs_dir }}/ (changed={{ artifact_copy.changed }})"
