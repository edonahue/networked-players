---
# Deploys the cohort seed-BFS job body (files/cohort_seed_bfs_job.py) to
# workers' persistent RQ jobs directory -- see ADR 0032 for why this job
# exists and why its dispatch unit is a chunk of seed artists, not
# individual neighbor lookups. Same copy-to-persistent-location pattern as
# deploy-verify-job.yml.
#
# hosts: workers (both x86_workers and pi_workers) -- unlike
# deploy-verify-job.yml (pi_workers only), this job's cost profile (one
# bounded, timeout-guarded chunk per RQ job, never open-ended traversal)
# fits docs/HARDWARE.md's Pi constraint just as well as the x86 worker, so
# there's no reason to withhold it from x86_workers.
#
# No artifact to deploy alongside it (unlike verify-job, which needs a
# challenge.v2.json) -- this job's only inputs are primitive args passed at
# enqueue time (seed_artist_ids, max_hops, max_frontier_expansion,
# snapshot_date) plus whatever one-hop dataset the target already holds in
# its own CATALOG_DATA_DIR cache (ADR 0025) -- replicate that first with
# `make replicate-x86`/`make replicate-pi` if it isn't there yet.
#
# Usage (from infra/ansible/, with a real local inventory):
#   ansible-playbook -i inventories/local/hosts.yml playbooks/deploy-cohort-seed-bfs-job.yml \
#     --limit worker-01.example.internal
- name: Deploy the cohort seed-BFS job to workers
  hosts: workers
  gather_facts: true
  vars:
    rq_jobs_dir: "{{ ansible_env.HOME }}/.local/share/networked-players/rq-jobs"
  tasks:
    - name: Create the RQ jobs directory
      ansible.builtin.file:
        path: "{{ rq_jobs_dir }}"
        state: directory
        mode: "0755"

    - name: Copy the seed-BFS job body (same file every worker gets, unmodified)
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../files/cohort_seed_bfs_job.py"
        dest: "{{ rq_jobs_dir }}/cohort_seed_bfs_job.py"
        mode: "0644"
      register: job_copy

    - name: Report deployment
      ansible.builtin.debug:
        msg:
          - "host: {{ inventory_hostname }}"
          - "job body deployed to {{ rq_jobs_dir }}/ (changed={{ job_copy.changed }})"
          - "precondition: this host must already hold a validated one-hop cache"
          - "(CATALOG_DATA_DIR/discogs-onehop/snapshot=<date>/.verified.json) for"
          - "whatever snapshot_date gets enqueued -- replicate it first if missing."
