---
# Idempotent facts + health playbook (ROADMAP Phase 1).
#
# Read-only by design: it gathers facts and reports/asserts, but changes nothing
# (no package installs, no accounts). Safe to run repeatedly as a first contact
# with new hardware. Mutating baseline roles come later, each behind its own ADR.
#
# Usage (from infra/ansible/, with a real local inventory):
#   ansible-playbook -i inventories/local/hosts.yml playbooks/health.yml
- name: Cluster facts and health
  hosts: all
  gather_facts: true
  tasks:
    - name: Require a 64-bit architecture
      # Pinned wheels (duckdb/lxml/pyarrow) need aarch64 or x86_64; 32-bit Pi OS fails.
      ansible.builtin.assert:
        that:
          - ansible_architecture in ['aarch64', 'x86_64']
        fail_msg: >-
          {{ inventory_hostname }} reports {{ ansible_architecture }};
          use a 64-bit OS (aarch64 on Raspberry Pi).

    - name: Find the target filesystem mount
      # disk_floor_mount defaults to '/' but the coordinator overrides it to /mnt/data
      # once its NVMe is attached (see ADR 0013) -- the ~250 GB ingest floor
      # (docs/DATA_SIZING.md) is only meaningful against the filesystem that actually
      # holds local/raw and local/processed, not necessarily the root filesystem.
      ansible.builtin.set_fact:
        floor_mount: "{{ ansible_mounts | selectattr('mount', 'equalto', disk_floor_mount | default('/')) | first }}"

    - name: Require a minimum free space floor
      # Catches a full disk. The ~250 GB ingest floor (docs/DATA_SIZING.md) is a
      # workstation/coordination-host concern, set per group via min_free_gb.
      ansible.builtin.assert:
        that:
          - (floor_mount.size_available | int) > (min_free_gb | int) * 1024 * 1024 * 1024
        fail_msg: >-
          {{ inventory_hostname }} has
          {{ (floor_mount.size_available / 1024 / 1024 / 1024) | round(1) }} GB free on
          {{ disk_floor_mount | default('/') }}, below the {{ min_free_gb }} GB floor.

    - name: Confirm the inventory's connection address is present locally
      # Catches Docker/Swarm picking the wrong interface before it ever matters --
      # if ansible_host isn't actually bound on this node, no later Ethernet-explicit
      # advertise-addr assumption (swarm-join.yml, ADR 0017) would be safe either.
      # Skipped for ansible_connection: local (the coordinator talks to itself).
      ansible.builtin.assert:
        that:
          - ansible_host in ansible_all_ipv4_addresses
        fail_msg: >-
          {{ inventory_hostname }}'s inventory ansible_host ({{ ansible_host }}) is not
          bound to any local interface ({{ ansible_all_ipv4_addresses }}) -- Swarm/Ansible
          would be targeting the wrong address.
      when: ansible_connection | default('') != 'local'

    - name: Check time synchronization
      ansible.builtin.command: timedatectl show --property=NTPSynchronized --value
      register: ntp_sync
      changed_when: false
      failed_when: false

    - name: Check NetworkManager vs dhcpcd (reported only, not asserted)
      # Informational -- confirms which network manager is actually active rather than
      # guessing from a stale assumption. Never used to change network config here.
      ansible.builtin.command: "systemctl is-active {{ item }}"
      register: netmgr_check
      changed_when: false
      failed_when: false
      loop:
        - NetworkManager
        - dhcpcd

    - name: Read SoC temperature when available (Raspberry Pi)
      ansible.builtin.slurp:
        src: /sys/class/thermal/thermal_zone0/temp
      register: soc_temp_raw
      failed_when: false

    - name: Report node health
      ansible.builtin.debug:
        msg:
          - "host: {{ inventory_hostname }} ({{ ansible_distribution }} {{ ansible_distribution_version }}, {{ ansible_architecture }})"
          - "cpus: {{ ansible_processor_vcpus | default('?') }}  memory_mb total: {{ ansible_memtotal_mb }}  free: {{ ansible_memfree_mb | default('?') }}  available: {{ ansible_memory_mb.nocache.free | default('?') }}"
          - "{{ disk_floor_mount | default('/') }} free GB: {{ (floor_mount.size_available / 1024 / 1024 / 1024) | round(1) }}"
          - "ntp synchronized: {{ ntp_sync.stdout | default('unknown') }}"
          - "connect address: {{ ansible_host | default('n/a (local connection)') }}"
          - >-
            network manager:
            {{ netmgr_check.results | default([])
               | map(attribute='item') | zip(netmgr_check.results | default([]) | map(attribute='stdout'))
               | map('join', '=') | join(', ') if netmgr_check.results is defined else 'n/a' }}
          - >-
            soc temp C:
            {{ ((soc_temp_raw.content | b64decode | trim | int) / 1000) | round(1)
               if soc_temp_raw.content is defined else 'n/a' }}

    # Memory HEADROOM (not just total) matters for whether a Pi 3B worker has
    # room for another process (e.g. a Dask worker, docs/decisions/0020) on
    # top of what's already running (Docker+Swarm+Portainer Agent+RQ+DuckDB).
    # No such number existed anywhere in this repo before this task -- only
    # aspirational "must fit in 1GB" language. Written once, aggregating
    # every host in this play, to local/benchmarks/ -- never a committed doc,
    # per docs/decisions/0018-benchmark-results-local-only.md.
    - name: Ensure local/benchmarks/ exists (local-only output, never committed)
      delegate_to: localhost
      become: false
      run_once: true
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../../../local/benchmarks"
        state: directory
        mode: "0755"

    - name: Write aggregated memory-headroom report (local-only)
      delegate_to: localhost
      become: false
      run_once: true
      ansible.builtin.copy:
        dest: "{{ playbook_dir }}/../../../local/benchmarks/pi-memory-headroom.md"
        mode: "0644"
        content: |
          # Pi / fleet memory headroom (local-only, not for publication)

          Generated by `playbooks/health.yml` -- observed, not projected (see
          AGENTS.md's "observed/sourced/projected/measured" rule). Total and
          free are Ansible's own `/proc/meminfo`-derived facts; "available"
          accounts for reclaimable cache/buffers (closer to real headroom for
          starting a new process than raw "free").

          | Host | Group(s) | Total MB | Free MB | Available MB |
          | --- | --- | --- | --- | --- |
          {% for host in ansible_play_hosts_all %}
          | {{ host }} | {{ hostvars[host].group_names | join(',') }} | {{ hostvars[host].ansible_memtotal_mb | default('?') }} | {{ hostvars[host].ansible_memfree_mb | default('?') }} | {{ hostvars[host].ansible_memory_mb.nocache.free | default('?') }} |
          {% endfor %}

          This file is local-only (see
          docs/decisions/0018-benchmark-results-local-only.md) -- never
          commit it. Used as the measurement gate before any Pi 3B worker is
          considered for Dask participation (see
          docs/decisions/0020-dask-jupyter-interactive-cluster-compute.md).
