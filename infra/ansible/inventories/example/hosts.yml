---
all:
  children:
    coordinators:
      hosts:
        coordinator.example.internal:
    workers:
      # A pending/offline worker (not yet flashed, or temporarily
      # unreachable) is handled by simply not listing it here -- do not add
      # a host that can't be reached, since health.yml/onboard.yml/
      # benchmark.yml all run against `hosts: all` / `hosts: workers` and a
      # single unreachable host would fail the whole run for everyone else.
      # Only three of the planned four workers are listed below as an
      # example of this: add worker-04.example.internal back once it's
      # actually reachable.
      hosts:
        worker-01.example.internal:
        worker-02.example.internal:
        worker-03.example.internal:
        # worker-04.example.internal:   # pending -- add back once reachable
    optional_build_nodes:
      hosts:
        build-node.example.internal:
