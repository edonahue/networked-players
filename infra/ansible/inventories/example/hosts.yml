---
all:
  children:
    coordinators:
      hosts:
        coordinator.example.internal:
    workers:
      # A pending/offline worker (not yet flashed, or temporarily
      # unreachable) is handled by simply not listing it here -- do not add
      # a host that can't be reached, since health.yml/onboard.yml/
      # benchmark.yml all run against `hosts: all` / `hosts: workers` and a
      # single unreachable host would fail the whole run for everyone else.
      # Only three of the planned four Pi workers are listed below as an
      # example of this: add worker-04.example.internal back once it's
      # actually reachable. x86-worker.example.internal (a non-Pi Swarm
      # worker, ADR 0022) is also a flat member of this group, alongside
      # the Pi's -- every generic playbook (health/benchmark/onboard/
      # swarm-join) reaches it this way with no separate targeting needed.
      hosts:
        worker-01.example.internal:
          platform_worker_id: worker-arm-01
        worker-02.example.internal:
          platform_worker_id: worker-arm-02
        worker-03.example.internal:
          platform_worker_id: worker-arm-03
        # worker-04.example.internal:   # pending -- add back once reachable
        x86-worker.example.internal:
          platform_worker_id: worker-x86-01
    # Pi 3B workers only -- harden-workers.yml/equip-workers.yml target this
    # group specifically (not `workers`), since both encode real Pi-specific
    # facts (hardware watchdog, SD-card log rotation, apt-based baseline
    # tooling) that don't hold for a non-Pi Swarm worker. See ADR 0022.
    pi_workers:
      hosts:
        worker-01.example.internal:
        worker-02.example.internal:
        worker-03.example.internal:
    # Non-Pi (e.g. x86_64) Swarm worker(s) -- documentation/targeting group
    # only, kept flat (not nested under `workers`) so `workers`' own `hosts:`
    # key stays non-empty for tooling that reads it directly (e.g.
    # bootstrap-worker-ssh.sh). See ADR 0022.
    x86_workers:
      hosts:
        x86-worker.example.internal:
    optional_build_nodes:
      hosts:
        build-node.example.internal:
