---
# Example group variables. Copy inventories/example/ to a git-ignored
# inventories/local/ and replace these with real values there.

# SSH user Ansible connects as (a non-root service account on real hosts).
ansible_user: deploy

# Minimum free space on / that the health playbook requires, in GB. This is a
# "disk not full" floor, not the ~250 GB ingest floor in docs/DATA_SIZING.md;
# raise it per-group for hosts that store dumps.
min_free_gb: 1

# System packages a later (mutating) baseline role would ensure are present.
# Listed here for reference; the health playbook does not install anything.
baseline_packages:
  - python3
  - ca-certificates

# LAN-reachable jobs-broker Redis URL (infra/swarm/docker-compose.jobs-broker.yml),
# consumed by playbooks/run-rq-burst-worker.yml. Placeholder password and
# RFC 5737 address here; real value lives in the git-ignored
# inventories/local/group_vars/all.yml, matching local/jobs-broker.env
# (see infra/swarm/deploy-jobs-broker.sh). Only started deliberately for a
# benchmark run, not a standing service.
jobs_broker_url: "redis://:CHANGEME@192.0.2.10:6380/0"
