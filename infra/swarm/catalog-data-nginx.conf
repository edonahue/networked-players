# Read-only static serving of /data (the processed catalog tree) -- see
# docker-compose.catalog-data.yml and ADR 0024. Range requests (nginx's
# default for static files) are what make remote DuckDB/PyArrow parquet
# reads efficient; do not disable them.
server {
    listen 80 default_server;
    server_name _;

    root /data;

    # JSON directory listings let fsspec-style clients enumerate a dataset
    # directly, though the documented contract is manifest-driven: read
    # <dataset>/manifest.json and fetch exactly the files it lists (with
    # sha256 integrity checking for free).
    autoindex on;
    autoindex_format json;

    sendfile on;
    tcp_nopush on;

    # Parquet is already zstd-compressed; recompressing wastes CPU.
    gzip off;

    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
