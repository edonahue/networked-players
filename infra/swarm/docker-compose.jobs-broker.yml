# Dedicated Redis for RQ job-queue traffic (cluster-vs-single-node benchmark
# today; a real packages/workers job body later). Separate from
# docker-compose.coordination.yml's Redis, which stays loopback-only per ADR
# 0010 and carries dev-loop application state, not cross-node job traffic.
#
# ADR 0034 promotes this from a temporary benchmark service to the standing
# bounded-job control plane. It remains bound to one private interface with a
# mandatory password. AOF preserves queued work across clean restarts; run
# artifacts and canonical state still live outside Redis.
#
# Own explicit Compose project name so this never shares an inferred project
# with docker-compose.coordination.yml / docker-compose.portainer.yml (see
# those files' own CAUTION comments about --remove-orphans and ADR 0013's
# Consequences section).
name: jobs-broker

services:
  jobs-broker:
    image: redis:7-alpine
    command:
      - redis-server
      - --requirepass
      - "${JOBS_BROKER_PASSWORD:?set in local/jobs-broker.env}"
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --auto-aof-rewrite-percentage
      - "100"
      - --auto-aof-rewrite-min-size
      - 32mb
    ports:
      - "${JOBS_BROKER_BIND_IP:?set in local/jobs-broker.env}:${JOBS_BROKER_PORT:-6380}:6379"
    restart: unless-stopped
    stop_grace_period: 30s
    mem_limit: 256m
    volumes:
      - jobs-broker-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${JOBS_BROKER_PASSWORD:?set in local/jobs-broker.env}", "--no-auth-warning", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  jobs-broker-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: "${JOBS_BROKER_DATA_DIR:?set in local/jobs-broker.env}"
